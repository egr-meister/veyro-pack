name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build signed APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependency versions
        run: npx expo install --fix

      - name: Expo doctor (non-blocking)
        continue-on-error: true
        run: |
          npx expo-doctor
          npx expo install --check

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Strip any stray whitespace/newlines the secret may contain before decoding.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 --decode > "$GITHUB_WORKSPACE/veyro-pack-release-key.p12"
          echo "Decoded keystore size: $(stat -c%s "$GITHUB_WORKSPACE/veyro-pack-release-key.p12") bytes"

      - name: Verify keystore is readable
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Fail fast with a clear message if the decoded keystore is corrupt
          # (e.g. the base64 secret was truncated when pasted).
          keytool -list -storetype PKCS12 \
            -keystore "$GITHUB_WORKSPACE/veyro-pack-release-key.p12" \
            -storepass "$STORE_PASSWORD" >/dev/null \
          || { echo "::error::Keystore is invalid/corrupt. Re-set the ANDROID_KEYSTORE_BASE64 secret from the exact .p12 base64."; exit 1; }
          echo "Keystore verified OK."

      - name: Build signed release APK
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PVEYRO_UPLOAD_STORE_FILE="$GITHUB_WORKSPACE/veyro-pack-release-key.p12" \
            -PVEYRO_UPLOAD_STORE_PASSWORD="$STORE_PASSWORD" \
            -PVEYRO_UPLOAD_KEY_ALIAS="$KEY_ALIAS" \
            -PVEYRO_UPLOAD_KEY_PASSWORD="$KEY_PASSWORD" \
            --no-daemon

      - name: Build signed release AAB
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PVEYRO_UPLOAD_STORE_FILE="$GITHUB_WORKSPACE/veyro-pack-release-key.p12" \
            -PVEYRO_UPLOAD_STORE_PASSWORD="$STORE_PASSWORD" \
            -PVEYRO_UPLOAD_KEY_ALIAS="$KEY_ALIAS" \
            -PVEYRO_UPLOAD_KEY_PASSWORD="$KEY_PASSWORD" \
            --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: veyro-pack-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: veyro-pack-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/veyro-pack-release-key.p12"
